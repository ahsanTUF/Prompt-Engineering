name: Generate and Release PDF

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'PATTERNS.md'
      - 'OBSOLETE_PATTERNS.md'
      - 'GLOSSARY.md'
      - '.github/workflows/pdf-release.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Combined Markdown
        run: |
          # Eisvogel-styled YAML frontmatter
          cat <<'FRONTMATTER' > PDF.md
          ---
          title: "The Prompt Engineering Handbook"
          subtitle: "21 Battle-Tested Patterns — From Beginner to Advanced"
          author: "Based on the Vanderbilt University Coursera Course"
          date: "$(date +'%B %d, %Y')"
          titlepage: true
          titlepage-color: "MidnightBlue"
          titlepage-text-color: "White"
          titlepage-rule-color: "Maroon"
          titlepage-rule-height: 2
          toc: true
          toc-own-page: true
          toc-depth: 2
          colorlinks: true
          linkcolor: "Maroon"
          urlcolor: "MidnightBlue"
          geometry: "margin=1in"
          fontsize: "11pt"
          listings: true
          listings-no-page-break: true
          code-block-font-size: \scriptsize
          header-left: "Prompt Engineering Handbook"
          header-right: "\\thepage"
          footer-left: "Prompt Engineering Patterns"
          footer-center: ""
          footer-right: ""
          book: true
          classoption: oneside
          ---
          FRONTMATTER

          # Append the core pattern files
          cat PATTERNS.md >> PDF.md
          printf '\n\\newpage\n\n' >> PDF.md
          cat OBSOLETE_PATTERNS.md >> PDF.md
          printf '\n\\newpage\n\n' >> PDF.md
          cat GLOSSARY.md >> PDF.md

          # Strip GitHub-specific emojis that clutter a formal PDF
          sed -i 's/📖 //g; s/💡 //g; s/⚙️ //g; s/🕰️ //g; s/📋 //g' PDF.md

          # Convert file links into plain text to avoid broken external links in the PDF
          sed -i 's/\[Prompt Patterns\](PATTERNS\.md)/Prompt Patterns/g' PDF.md
          sed -i 's/\[README\.md\](README\.md)/README.md/g' PDF.md
          sed -i 's/\[CONTRIBUTING\.md\](CONTRIBUTING\.md)/CONTRIBUTING.md/g' PDF.md
          
          # Remove isolated file-only navigation lines entirely
          sed -i '/See README\.md for the rating/d' PDF.md
          sed -i '/See PATTERNS\.md for all active/d' PDF.md

          # Convert GLOSSARY.md anchor links to internal PDF anchors
          # e.g. [LLM](GLOSSARY.md#llm) -> [LLM](#llm)
          sed -i 's|(GLOSSARY\.md#|(#|g' PDF.md

      - name: Convert Markdown to PDF with Pandoc + Eisvogel
        uses: docker://pandoc/extra:latest
        with:
          args: >-
            --from=markdown
            --to=pdf
            --output=PDF.pdf
            --pdf-engine=xelatex
            --template=eisvogel
            --top-level-division=chapter
            PDF.md

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Prompt Engineering Handbook (Latest)"
          tag_name: "latest"
          files: PDF.pdf
          body: |
            **Auto-generated PDF Handbook**

            Compiled directly from the latest source Markdown files in this repository.
            This PDF includes all 21 active patterns, archived patterns, and the glossary.

            _Last updated: ${{ github.event.head_commit.timestamp }}_
          make_latest: true

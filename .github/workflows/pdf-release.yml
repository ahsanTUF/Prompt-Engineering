name: Generate and Release PDF

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'PATTERNS.md'
      - 'OBSOLETE_PATTERNS.md'
      - 'GLOSSARY.md'
      - '.github/workflows/pdf-release.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Combined Markdown
        run: |
          # Title Page
          echo "---" > PDF.md
          echo "title: The Prompt Engineering Handbook" >> PDF.md
          echo "subtitle: 21 Battle-Tested Patterns — From Beginner to Advanced" >> PDF.md
          echo "author: Based on the Vanderbilt University Coursera Course" >> PDF.md
          echo "geometry: margin=1in" >> PDF.md
          echo "toc: true" >> PDF.md
          echo "toc-depth: 2" >> PDF.md
          echo "colorlinks: true" >> PDF.md
          echo "linkcolor: blue" >> PDF.md
          echo "urlcolor: blue" >> PDF.md
          echo "header-includes:" >> PDF.md
          echo "  - \\usepackage{fancyhdr}" >> PDF.md
          echo "  - \\pagestyle{fancy}" >> PDF.md
          echo "  - \\fancyhead[C]{Prompt Engineering Handbook}" >> PDF.md
          echo "  - \\fancyfoot[C]{\\thepage}" >> PDF.md
          echo "---" >> PDF.md
          echo "" >> PDF.md

          # Append the core pattern files
          cat PATTERNS.md >> PDF.md
          echo "" >> PDF.md
          echo "\\newpage" >> PDF.md
          echo "" >> PDF.md
          cat OBSOLETE_PATTERNS.md >> PDF.md
          echo "" >> PDF.md
          echo "\\newpage" >> PDF.md
          echo "" >> PDF.md
          cat GLOSSARY.md >> PDF.md

      - name: Convert Markdown to PDF with Pandoc
        uses: docker://pandoc/latex:latest
        with:
          args: >-
            --from=markdown
            --to=pdf
            --output=PDF.pdf
            --pdf-engine=xelatex
            PDF.md

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Prompt Engineering Handbook (Latest)"
          tag_name: "latest"
          files: PDF.pdf
          body: |
            📄 **Auto-generated PDF Handbook**

            Compiled directly from the latest source Markdown files in this repository.
            This PDF includes all 21 active patterns, archived patterns, and the glossary.

            _Last updated: ${{ github.event.head_commit.timestamp }}_
          make_latest: true

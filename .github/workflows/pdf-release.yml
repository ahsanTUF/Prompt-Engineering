name: Generate and Release PDF

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'PATTERNS.md'
      - 'OBSOLETE_PATTERNS.md'
      - 'GLOSSARY.md'
      - '.github/workflows/pdf-release.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Combined Markdown
        run: |
          # Eisvogel-styled YAML frontmatter
          cat <<'FRONTMATTER' > PDF.md
          ---
          title: "The Prompt Engineering Handbook"
          subtitle: "21 Battle-Tested Patterns — From Beginner to Advanced"
          author: "Based on the Vanderbilt University Coursera Course \\\\ Compiled by **[ahsanTUF](https://github.com/ahsanTUF)**"
          date: "$(date +'%B %d, %Y')"
          header-includes:
            - \usepackage{pifont}
          titlepage: true
          titlepage-color: "FFCC00"
          titlepage-text-color: "0A192F"
          titlepage-rule-color: "0A192F"
          titlepage-rule-height: 2
          toc: true
          toc-own-page: true
          toc-depth: 2
          colorlinks: true
          linkcolor: "Maroon"
          urlcolor: "MidnightBlue"
          geometry: "margin=1in"
          fontsize: "11pt"
          listings: true
          listings-no-page-break: true
          code-block-font-size: \scriptsize
          header-left: "Prompt Engineering Handbook"
          header-right: "\\thepage"
          footer-left: "Prompt Engineering Patterns"
          footer-center: ""
          footer-right: ""
          book: true
          classoption: oneside
          ---
          FRONTMATTER

          # Append the core pattern files
          awk '/## 📖 How to Read the Patterns/{flag=1} flag' README.md >> PDF.md
          printf '\n\\newpage\n\n' >> PDF.md
          cat PATTERNS.md >> PDF.md
          printf '\n\\newpage\n\n' >> PDF.md
          cat OBSOLETE_PATTERNS.md >> PDF.md
          printf '\n\\newpage\n\n' >> PDF.md
          cat GLOSSARY.md >> PDF.md

          # Strip GitHub-specific emojis that clutter a formal PDF (Standard + Complex + U+FE0F/Variation Selectors)
          sed -i -E 's/[📖💡⚙🕰📋📁🏷⚖🤝📄🗃⭐] ?//g' PDF.md
          sed -i 's/\xef\xb8\x8f//g' PDF.md

          # Translate Unicode stars into bulletproof LaTeX pifont commands
          sed -i 's/★/\\ding{72}/g' PDF.md
          sed -i 's/☆/\\ding{73}/g' PDF.md

          # Normalize Pandoc ID formatting for mismatched edge-case anchors
          sed -i -E 's/#-usability-scale/#usability-scale/g' PDF.md
          sed -i -E 's/#react-reason--act-prompting/#react-reason-act-prompting/g' PDF.md

          # 1. Unify Cross-File Anchors (e.g., PATTERNS.md#2-persona -> #2-persona)
          sed -i -E 's/\([A-Z_]+\.md#/(#/g' PDF.md

          # 2. Match Pandoc Auto-IDs (dynamically strip leading numbers: #2-persona -> #persona)
          sed -i -E 's/\(#([0-9]+-)/\(#/g' PDF.md

          # 3. Strip Dead File Links (clean up remaining file-to-file links lacking anchors)
          sed -i -E 's/\[([^]]+)\]\([^)#]+\.md\)/\1/g' PDF.md
          
          # Remove isolated file-only navigation lines entirely
          sed -i '/See README\.md for the rating/d' PDF.md
          sed -i '/See PATTERNS\.md for all active/d' PDF.md


      - name: Convert Markdown to PDF with Pandoc + Eisvogel
        uses: docker://pandoc/extra:latest
        with:
          args: >-
            --from=markdown
            --to=pdf
            --output=PDF.pdf
            --pdf-engine=xelatex
            --template=eisvogel
            --top-level-division=chapter
            PDF.md

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Prompt Engineering Handbook (Latest)"
          tag_name: "latest"
          files: PDF.pdf
          body: |
            **Auto-generated PDF Handbook**

            Compiled directly from the latest source Markdown files in this repository.
            This PDF includes all 21 active patterns, archived patterns, and the glossary.

            _Last updated: ${{ github.event.head_commit.timestamp }}_
          make_latest: true
